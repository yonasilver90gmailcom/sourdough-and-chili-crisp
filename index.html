<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cookie Corner</title>
    <style>
        :root {
            --primary: #6d4c41;
            --primary-light: #d7ccc8;
            --accent: #ffb74d;
            --text: #3e2723;
            --bg: #fffbf7;
            --danger: #e53935;
            --success: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(109, 76, 65, 0.08);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #795548;
            margin-top: 0;
            margin-bottom: 25px;
            font-style: italic;
            font-size: 1.05rem;
        }

        .status-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .status-tag {
            display: inline-block;
            background-color: #e8f5e9;
            color: var(--success);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .notice-box {
            background-color: #ffebee;
            border-left: 4px solid var(--danger);
            padding: 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.4;
            color: #c62828;
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--primary);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1.5px solid var(--primary-light);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: all 0.2s ease;
            color: var(--text);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 183, 77, 0.25);
        }

        /* Styling for the conditional address container */
        #address-container {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .delivery-active {
            background-color: #fffde7 !important;
            border-color: var(--accent) !important;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #4e342e;
        }

        button:active {
            transform: scale(0.98);
        }

        #sold-out-notice {
            display: none;
            text-align: center;
            background-color: #ffebee;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍪 The Cookie Corner</h1>
        <p class="subtitle">Freshly baked cookies for Shabbos</p>
        
        <div class="status-container">
            <div id="stock-tag" class="status-tag">🟢 ACCEPTING PRE-ORDERS</div>
        </div>

        <div class="notice-box">
            ⚠️ Please pay your due amount right away if you want to save your spot! <br>
            <span style="font-weight: normal; font-size: 0.85rem; color: #3e2723; display:block; margin-top: 5px;">
            Send Interac E-Transfer to: <strong>yonasilver90@gmail.com</strong>
            </span>
        </div>

        <div id="sold-out-notice"></div>

        <form id="cookie-form" action="https://formspree.io/f/xeeyqvod" method="POST">
            
            <label for="name">Your Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>

            <label for="order_selection">Select Your Order</label>
            <select id="order_selection" name="order_selection" required>
                <option value="" disabled selected>Choose an option...</option>
                <option value="1-dozen-pickup">1 Dozen Cookies - Friday Pickup ($7.99)</option>
                <option value="2-dozen-pickup">2 Dozen Cookies - Friday Pickup ($15.98)</option>
                <option value="1-dozen-delivery">1 Dozen Cookies - Friday Delivery ($7.99 + $4.99 delivery fee)</option>
                <option value="2-dozen-delivery">2 Dozen Cookies - Friday Delivery ($15.98 + $4.99 delivery fee)</option>
            </select>

            <div id="address-container">
                <label for="delivery_address">Delivery Address <span style="color: var(--danger);">*</span></label>
                <textarea id="delivery_address" name="delivery_address" rows="3" placeholder="REQUIRED: Please enter your complete street address, unit/apartment number, buzzer codes, and drop-off instructions here."></textarea>
            </div>

            <div id="notes-container">
                <label for="special_notes">Special Notes / Requests</label>
                <textarea id="special_notes" name="special_notes" rows="3" placeholder="Any allergy notes, preferred pickup time, or general requests..."></textarea>
            </div>

            <button type="submit">Submit Pre-Order</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("cookie-form");
        const orderSelection = document.getElementById("order_selection");
        const addressContainer = document.getElementById("address-container");
        const addressInput = document.getElementById("delivery_address");

        // Dynamically toggle the Address field visibility & required status
        orderSelection.addEventListener("change", function() {
            if (this.value.includes("delivery")) {
                addressContainer.style.display = "block";
                addressInput.required = true;
                addressInput.classList.add("delivery-active");
            } else {
                addressContainer.style.display = "none";
                addressInput.required = false;
                addressInput.classList.remove("delivery-active");
                addressInput.value = ""; // Clear address input if user switches to pickup
            }
        });

        // --- AUTOMATIC DEADLINE CHECK ---
        const now = new Date();
        const currentDay = now.getDay(); 
        const currentHour = now.getHours();

        if ((currentDay === 3 && currentHour >= 22) || currentDay === 4 || currentDay === 5) {
            showSoldOut("⏰ The pre-order deadline for this week has passed!");
        }

        function showSoldOut(message) {
            form.style.display = "none";
            const notice = document.getElementById("sold-out-notice");
            notice.innerHTML = message + "<br><span style='font-size:1rem; font-weight:normal; color:#555;'>Please check back next week.</span>";
            notice.style.display = "block";
            
            const stockTag = document.getElementById("stock-tag");
            stockTag.innerText = "🔴 CLOSED FOR THIS WEEK";
            stockTag.style.backgroundColor = "#ffebee";
            stockTag.style.color = "var(--danger)";
        }
    </script>

</body>
</html>
