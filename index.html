<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cookie Corner</title>
    <style>
        :root {
            --primary: #6d4c41;
            --primary-light: #d7ccc8;
            --accent: #ffb74d;
            --text: #3e2723;
            --bg: #fffbf7;
            --danger: #e53935;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* The new success page container */
        #success-page {
            display: none;
            text-align: center;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #795548;
            margin-top: 0;
            margin-bottom: 25px;
            font-style: italic;
        }

        .status-tag {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            width: fit-content;
        }

        .payment-box {
            background-color: #ffebee;
            border: 2px solid var(--danger);
            padding: 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-top: 20px;
            line-height: 1.5;
            color: #c62828;
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--primary-light);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4e342e;
        }

        #sold-out-notice {
            display: none;
            text-align: center;
            background-color: #ffebee;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="form-page" class="container">
        <h1>🍪 The Cookie Corner</h1>
        <p class="subtitle">Freshly baked cookies for Shabbos</p>
        
        <div style="text-align: center;">
            <div id="stock-tag" class="status-tag">🟢 ACCEPTING PRE-ORDERS</div>
        </div>

        <div id="sold-out-notice"></div>

        <form id="cookie-form" action="https://formspree.io/f/yonasilver90@gmail.com" method="POST">
            
            <label for="name">Your Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>

            <label for="order_selection">Select Your Order</label>
            <select id="order_selection" name="order_selection" required>
                <option value="" disabled selected>Choose an option...</option>
                <option value="1-dozen-pickup">1 Dozen Cookies - Friday Pickup ($7.99)</option>
                <option value="2-dozen-pickup">2 Dozen Cookies - Friday Pickup ($15.98)</option>
                <option value="1-dozen-delivery">1 Dozen Cookies - Friday Delivery ($7.99 + $4.99 delivery fee)</option>
                <option value="2-dozen-delivery">2 Dozen Cookies - Friday Delivery ($15.98 + $4.99 delivery fee)</option>
            </select>

            <label id="notes-label" for="address_or_notes">Address / Special Notes</label>
            <textarea id="address_or_notes" name="address_or_notes" rows="4" placeholder="If delivery is selected, please enter your full street address, unit/apartment number, and specific delivery or buzzer instructions here."></textarea>

            <button type="submit" id="submit-btn">Submit Pre-Order</button>
        </form>
    </div>

    <div id="success-page" class="container">
        <h1>✅ Order Received!</h1>
        <p class="subtitle">Just one more step to secure your cookies.</p>
        
        <div class="payment-box">
            ⚠️ Please pay your due amount right away if you want to save your spot! <br>
            <span style="font-weight: normal; font-size: 1rem; color: #3e2723; display:block; margin-top: 15px;">
            Send Interac E-Transfer to:<br> 
            <strong style="font-size: 1.2rem;">yonasilver90@gmail.com</strong>
            </span>
        </div>
        <br>
        <button onclick="window.location.reload();" style="background-color: var(--primary-light); color: var(--text);">Place Another Order</button>
    </div>

    <script>
        const form = document.getElementById("cookie-form");
        const orderSelection = document.getElementById("order_selection");
        const notesInput = document.getElementById("address_or_notes");
        const formPage = document.getElementById("form-page");
        const successPage = document.getElementById("success-page");
        const submitBtn = document.getElementById("submit-btn");

        // Dynamically make the field strictly mandatory if delivery is picked
        orderSelection.addEventListener("change", function() {
            if (this.value.includes("delivery")) {
                notesInput.required = true;
                notesInput.placeholder = "MANDATORY FOR DELIVERY: Please include your complete address, apartment/unit number, buzzer codes, or any specific drop-off instructions.";
            } else {
                notesInput.required = false;
                notesInput.placeholder = "If delivery is selected, please enter your full street address, unit/apartment number, and specific delivery or buzzer instructions here.";
            }
        });

        // Form submission via AJAX to show the second page
        form.addEventListener("submit", async function(event) {
            event.preventDefault(); // Stop standard redirect
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            var data = new FormData(event.target);
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    formPage.style.display = "none";
                    successPage.style.display = "block";
                    form.reset();
                } else {
                    alert("Oops! There was a problem submitting your order. Please try again.");
                    submitBtn.innerText = "Submit Pre-Order";
                    submitBtn.disabled = false;
                }
            }).catch(error => {
                alert("Oops! There was a network error. Please try again.");
                submitBtn.innerText = "Submit Pre-Order";
                submitBtn.disabled = false;
            });
        });

        // --- AUTOMATIC DEADLINE CHECK ---
        const now = new Date();
        const currentDay = now.getDay(); 
        const currentHour = now.getHours();

        if ((currentDay === 3 && currentHour >= 22) || currentDay === 4 || currentDay === 5) {
            showSoldOut("⏰ The pre-order deadline for this week has passed!");
        }

        function showSoldOut(message) {
            form.style.display = "none";
            const notice = document.getElementById("sold-out-notice");
            notice.innerHTML = message + "<br><span style='font-size:1rem; font-weight:normal; color:#555;'>Please check back next week.</span>";
            notice.style.display = "block";
            
            const stockTag = document.getElementById("stock-tag");
            stockTag.innerText = "🔴 CLOSED FOR THIS WEEK";
            stockTag.style.backgroundColor = "#ffebee";
            stockTag.style.color = "var(--danger)";
        }
    </script>

</body>
</html>
