<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourdough & Chili Crisp</title>
    <style>
        :root {
            --primary: #9e2a2b; /* Deep chili red */
            --primary-light: #e09f68; /* Warm sourdough crust gold */
            --accent: #f35b04; /* Bright chili oil orange */
            --text: #3f1d14; /* Deep rustic brown */
            --bg: #fffcf2; /* Soft artisanal cream */
            --danger: #d90429;
            --success: #38b000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--primary-light) 0.5px, transparent 0.5px), radial-gradient(var(--primary-light) 0.5px, var(--bg) 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 30px 30px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(158, 42, 43, 0.15);
            border: 2px solid var(--primary-light);
            box-sizing: border-box;
            position: relative; /* Allows absolute positioning for the badge */
        }

        /* Thornhill Exclusive Side Badge */
        .location-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(158, 42, 43, 0.2);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 10px;
            margin-bottom: 25px;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .status-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .status-tag {
            display: inline-block;
            background-color: #e8f5e9;
            color: var(--success);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .notice-box {
            background-color: #fff0f0;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.4;
            color: var(--primary);
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #ecd9c6;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fffdfa;
            transition: all 0.2s ease;
            color: var(--text);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(243, 91, 4, 0.2);
        }

        .mandatory-field {
            background-color: #fffde7 !important;
            border-color: var(--primary-light) !important;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(158, 42, 43, 0.3);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #7a2021;
        }

        button:active {
            transform: scale(0.98);
        }

        #sold-out-notice {
            display: none;
            text-align: center;
            background-color: #fff0f0;
            color: var(--danger);
            border: 2px solid var(--primary);
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="location-badge">📍 Thornhill Exclusive Delivery</div>

        <h1>🌶️ Sourdough & Chili Crisp</h1>
        
        <div class="status-container">
            <div id="stock-tag" class="status-tag">🟢 ACCEPTING PRE-ORDERS</div>
        </div>

        <div id="sold-out-notice"></div>

        <form id="order-form" action="https://formspree.io/f/xeeyqvod" method="POST">
            
            <label for="name">Your Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>

            <label for="order_selection">Select Your Order</label>
            <select id="order_selection" name="order_selection" required>
                <option value="" disabled selected>Choose an option...</option>
                <option value="1-pack-delivery">1 Sourdough Loaf & 1 Chili Crisp Jar - FREE Delivery ($19.99)</option>
                <option value="2-pack-delivery">2 Sourdough Loaves & 2 Chili Crisp Jars - FREE Delivery ($39.98)</option>
            </select>

            <div id="address-container">
                <label for="delivery_address">Delivery Address <span style="color: var(--danger);">*</span></label>
                <textarea id="delivery_address" name="delivery_address" class="mandatory-field" rows="3" placeholder="REQUIRED: Please enter your complete street address, unit/apartment/building number, buzzer codes, and drop-off instructions here." required></textarea>
            </div>

            <div id="notes-container">
                <label for="special_notes">Special Notes / Requests</label>
                <textarea id="special_notes" name="special_notes" rows="3" placeholder="Any dietary restrictions, preferences, or general delivery instructions..."></textarea>
            </div>

            <div class="notice-box">
                ⚠️ Please pay your due amount right away if you want to save your spot! <br>
                <span style="font-weight: normal; font-size: 0.85rem; color: var(--text); display:block; margin-top: 5px;">
                Send Interac E-Transfer to: <strong>yonasilver90@gmail.com</strong>
                </span>
            </div>

            <button type="submit">Submit Pre-Order</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("order-form");

        // --- AUTOMATIC DEADLINE CHECK ---
        const now = new Date();
        const currentDay = now.getDay(); 
        const currentHour = now.getHours();

        if ((currentDay === 3 && currentHour >= 22) || currentDay === 4 || currentDay === 5) {
            showSoldOut("⏰ The pre-order deadline for this week has passed!");
        }

        function showSoldOut(message) {
            form.style.display = "none";
            const notice = document.getElementById("sold-out-notice");
            notice.innerHTML = message + "<br><span style='font-size:1rem; font-weight:normal; color:#555;'>Please check back next week.</span>";
            notice.style.display = "block";
            
            const stockTag = document.getElementById("stock-tag");
            stockTag.innerText = "🔴 CLOSED FOR THIS WEEK";
            stockTag.style.backgroundColor = "#fff0f0";
            stockTag.style.color = "var(--danger)";
        }
    </script>

</body>
</html>
