<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cookie Corner</title>
    <style>
        :root {
            --primary: #6d4c41;
            --primary-light: #d7ccc8;
            --accent: #ffb74d;
            --text: #3e2723;
            --bg: #fffbf7;
            --danger: #e53935;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #795548;
            margin-top: 0;
            margin-bottom: 25px;
            font-style: italic;
        }

        .status-tag {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            width: fit-content;
        }

        .notice-box {
            background-color: #ffebee;
            border-left: 4px solid var(--danger);
            padding: 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.4;
            color: #c62828;
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--primary-light);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4e342e;
        }

        #delivery-address-section {
            display: none;
            background-color: #fffde7;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #fbc02d;
            margin-bottom: 20px;
        }

        #delivery-address-section label {
            color: #f57f17;
        }

        #sold-out-notice {
            display: none;
            text-align: center;
            background-color: #ffebee;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍪 The Cookie Corner</h1>
        <p class="subtitle">Freshly baked cookies for Shabbos</p>
        
        <div id="stock-tag" class="status-tag">🟢 ACCEPTING PRE-ORDERS</div>

        <div class="notice-box">
            ⚠️ Please pay you’re due amount right away if you want to save your spot! <br>
            <span style="font-weight: normal; font-size: 0.85rem; color: #3e2723; display:block; margin-top: 5px;">
            Send Interac E-Transfer to: <strong>yonasilver90@gmail.com</strong>
            </span>
        </div>

        <div id="sold-out-notice"></div>

        <form id="cookie-form" action="https://formspree.io/f/yonasilver90@gmail.com" method="POST">
            
            <label for="name">Your Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>

            <label for="order_selection">Select Your Order</label>
            <select id="order_selection" name="order_selection" required>
                <option value="" disabled selected>Choose an option...</option>
                <option value="1-dozen-pickup">1 Dozen Cookies - Friday Pickup ($10.99)</option>
                <option value="2-dozen-pickup">2 Dozen Cookies - Friday Pickup ($21.98)</option>
                <option value="1-dozen-delivery">1 Dozen Cookies - Friday Delivery ($10.99 + $4.99 delivery fee)</option>
                <option value="2-dozen-delivery">2 Dozen Cookies - Friday Delivery ($21.98 + $4.99 delivery fee)</option>
            </select>

            <div id="delivery-address-section">
                <label for="delivery_address">Delivery Address & Specific Instructions</label>
                <textarea id="delivery_address" name="delivery_address" rows="3" placeholder="Street address, building/apartment number, buzzer code, or drop-off instructions..."></textarea>
            </div>

            <label for="address_or_notes">Special Requests / Pickup Notes</label>
            <textarea id="address_or_notes" name="address_or_notes" rows="2" placeholder="Any dietary notes or general requests..."></textarea>

            <button type="submit">Submit Pre-Order</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("cookie-form");
        const orderSelection = document.getElementById("order_selection");
        const deliverySection = document.getElementById("delivery-address-section");
        const deliveryInput = document.getElementById("delivery_address");

        // Show/hide address field and toggle 'required' state depending on selection
        orderSelection.addEventListener("change", function() {
            if (this.value.includes("delivery")) {
                deliverySection.style.display = "block";
                deliveryInput.required = true;
            } else {
                deliverySection.style.display = "none";
                deliveryInput.required = false;
                deliveryInput.value = ""; // Clear if they switched back to pickup
            }
        });

        // --- AUTOMATIC DEADLINE CHECK ---
        const now = new Date();
        const currentDay = now.getDay(); 
        const currentHour = now.getHours();

        if ((currentDay === 3 && currentHour >= 22) || currentDay === 4 || currentDay === 5) {
            showSoldOut("⏰ The pre-order deadline for this week has passed!");
        }

        function showSoldOut(message) {
            form.style.display = "none";
            const notice = document.getElementById("sold-out-notice");
            notice.innerHTML = message + "<br><span style='font-size:1rem; font-weight:normal; color:#555;'>Please check back next week.</span>";
            notice.style.display = "block";
            
            const stockTag = document.getElementById("stock-tag");
            stockTag.innerText = "🔴 CLOSED FOR THIS WEEK";
            stockTag.style.backgroundColor = "#ffebee";
            stockTag.style.color = "var(--danger)";
        }
    </script>

</body>
</html>
